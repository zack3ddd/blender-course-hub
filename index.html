<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>零基礎學3D｜課程資源中心</title>
<style>
:root{
  --bg:#15130f; --panel:#201c16; --panel2:#29231a;
  --line:#3f372b; --text:#f2ece0; --dim:#a49a8b;
  --accent:#f4902e; --gold:#f3c552; --ok:#6cba82; --warn:#e6b13f; --no:#e26454;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);
  font-family:"Noto Sans TC",-apple-system,"Segoe UI",sans-serif;
  line-height:1.65;padding:0 0 90px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
.topbar{height:3px;background:linear-gradient(90deg,var(--gold),var(--accent) 55%,var(--no))}

header{border-bottom:1px solid var(--line);padding:32px 0 24px;margin-bottom:22px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
h1{font-size:1.6rem;letter-spacing:.02em}
h1 span{color:var(--accent)}
h1 .sep{color:var(--dim);font-weight:400;margin:0 .12em}
.sub{color:var(--dim);font-size:.9rem;margin-top:6px}
.brand{text-decoration:none;display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  flex-shrink:0;padding-top:2px}
.brand-name{font-size:1.15rem;font-weight:800;color:var(--text);letter-spacing:.03em}
.brand-name b{color:var(--gold)}
.brand-tag{font-size:.72rem;color:var(--dim);letter-spacing:.06em}
.brand:hover .brand-name{color:var(--accent)}

/* 全站環境列 */
.envbar{position:sticky;top:0;z-index:20;background:rgba(20,18,15,.96);
  backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:10px;
  padding:12px 16px;margin-bottom:20px;display:flex;gap:18px;
  flex-wrap:wrap;align-items:center}
.envbar .flabel{font-size:.8rem;color:var(--dim)}
.envgrp{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.envnote{color:var(--dim);font-size:.78rem;margin-left:auto}

nav.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--line);
  overflow-x:auto}
nav.tabs button{background:none;border:0;color:var(--dim);padding:10px 15px;
  font-size:.92rem;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
nav.tabs button.on{color:var(--text);border-bottom-color:var(--accent)}

.filters{background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:16px 18px;margin-bottom:22px}
.frow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.frow:last-child{margin-bottom:0}
.flabel{font-size:.82rem;color:var(--dim);width:70px;flex-shrink:0}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--dim);
  padding:5px 13px;border-radius:20px;font-size:.84rem;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#14120f;font-weight:600}
input[type=text]{flex:1;min-width:180px;background:var(--panel2);border:1px solid var(--line);
  color:var(--text);padding:8px 13px;border-radius:6px;font-size:.9rem;font-family:inherit}
input[type=text]:focus{outline:0;border-color:var(--accent)}

.count{color:var(--dim);font-size:.85rem;margin-bottom:13px}
.count b{color:var(--accent)}
h2.sec{font-size:1.05rem;margin:26px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}
h2.sec:first-child{margin-top:0}

.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:17px 19px;margin-bottom:13px}
.chead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.cname{font-size:1.06rem;font-weight:600}
.ccat{display:inline-block;font-size:.72rem;color:var(--dim);
  border:1px solid var(--line);padding:1px 8px;border-radius:4px;margin-left:8px;vertical-align:2px}
.cdesc{color:var(--dim);font-size:.87rem;margin-top:5px}
.status{font-size:.79rem;padding:4px 11px;border-radius:5px;white-space:nowrap;font-weight:600}
.s-ok{background:rgba(95,184,122,.15);color:var(--ok)}
.s-warn{background:rgba(224,168,60,.15);color:var(--warn)}
.s-no{background:rgba(208,90,78,.15);color:var(--no)}

.vbox{margin-top:13px;border-top:1px solid var(--line);padding-top:13px}
.vrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 0;font-size:.87rem}
.vrow+.vrow{border-top:1px dashed var(--line)}
.vtag{background:var(--panel2);padding:3px 10px;border-radius:5px;
  font-family:ui-monospace,monospace;font-size:.81rem}
.os{color:var(--dim);font-size:.84rem}
.acts{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.dl{color:var(--accent);text-decoration:none;font-size:.84rem;
  border:1px solid var(--accent);padding:4px 13px;border-radius:5px}
.dl:hover{background:var(--accent);color:#14120f}
.home{color:var(--dim);text-decoration:none;font-size:.84rem;
  border:1px solid var(--line);padding:4px 12px;border-radius:5px}
.home:hover{border-color:var(--accent);color:var(--accent)}
.path{width:100%;color:var(--dim);font-size:.78rem;font-family:ui-monospace,monospace;margin-top:2px}
.note{width:100%;color:var(--warn);font-size:.79rem;margin-top:2px}
.checked{width:100%;color:var(--dim);font-size:.74rem;margin-top:3px;opacity:.7}

/* 插件卡：來源徽章 / 功能標籤 / 章節 */
.srcb{display:inline-block;font-size:.72rem;padding:1px 9px;border-radius:4px;
  margin-left:8px;vertical-align:2px;font-weight:600}
.srcb-mine{background:rgba(232,135,58,.16);color:var(--accent);border:1px solid rgba(232,135,58,.45)}
.srcb-builtin{background:rgba(95,184,122,.14);color:var(--ok);border:1px solid rgba(95,184,122,.4)}
.srcb-external{background:rgba(224,168,60,.14);color:var(--warn);border:1px solid rgba(224,168,60,.4)}
.ctags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;align-items:center}
.chip-chapter{font-size:.73rem;color:var(--gold);border:1px solid rgba(243,197,82,.5);
  padding:1px 10px;border-radius:20px;font-weight:600}
.ftag2{font-size:.73rem;color:var(--dim);background:var(--panel2);border:1px solid var(--line);
  padding:1px 10px;border-radius:20px}
.vrow-no{opacity:.5}

/* FAQ */
.faq{background:var(--panel);border:1px solid var(--line);border-radius:9px;margin-bottom:10px}
.fq{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;gap:12px;font-weight:600;font-size:.95rem}
.fq .arrow{color:var(--dim);transition:.2s;flex-shrink:0}
.faq.open .arrow{transform:rotate(90deg);color:var(--accent)}
.fa{max-height:0;overflow:hidden;transition:max-height .25s;padding:0 18px}
.faq.open .fa{max-height:900px;padding:0 18px 16px}
.fa .lbl{color:var(--accent);font-size:.79rem;margin-top:10px;font-weight:600}
.fa p{color:var(--dim);font-size:.87rem;margin-top:3px}
.ftags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ftag{font-size:.72rem;color:var(--dim);border:1px solid var(--line);
  padding:1px 8px;border-radius:4px}

.mailbox{background:var(--panel);border:1px dashed var(--accent);border-radius:10px;
  padding:20px;margin-top:24px;text-align:center}
.mailbox h3{font-size:1rem;margin-bottom:6px}
.mailbox p{color:var(--dim);font-size:.87rem;margin-bottom:14px}
.btn{display:inline-block;background:var(--accent);color:#14120f;text-decoration:none;
  padding:9px 22px;border-radius:6px;font-weight:600;font-size:.9rem;border:0;
  cursor:pointer;font-family:inherit}

/* 硬體 */
.gpusel{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:16px 18px;margin-bottom:18px}
select{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  padding:8px 12px;border-radius:6px;font-family:inherit;font-size:.9rem;min-width:200px}
select:focus{outline:0;border-color:var(--accent)}
.rec{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:9px;padding:16px 19px;margin-bottom:11px}
.rec h4{font-size:.95rem;margin-bottom:8px}
.kv{display:flex;gap:10px;padding:5px 0;font-size:.87rem;border-bottom:1px dashed var(--line)}
.kv:last-child{border:0}
.kv .k{color:var(--dim);width:130px;flex-shrink:0}
.kv .v{font-family:ui-monospace,monospace;color:var(--accent)}

/* 更新日誌 */
.log{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:8px;padding:15px 18px;margin-bottom:11px}
.ldate{font-family:ui-monospace,monospace;font-size:.8rem;color:var(--dim)}
.ltype{font-size:.72rem;padding:2px 8px;border-radius:4px;margin-left:10px}
.t-plugin{background:rgba(232,135,58,.15);color:var(--accent)}
.t-blender{background:rgba(95,184,122,.15);color:var(--ok)}
.t-alert{background:rgba(208,90,78,.15);color:var(--no)}
.t-course{background:rgba(154,144,132,.18);color:var(--dim)}
.ltitle{font-weight:600;margin:6px 0 3px}
.lbody{color:var(--dim);font-size:.87rem}

.hide{display:none}
.empty{text-align:center;color:var(--dim);padding:46px 0}
@media(max-width:640px){
  .flabel{width:auto}
  .envbar{gap:10px}
  .envnote{display:none}
}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="wrap">

<header>
  <div>
    <h1>零基礎學3D<span class="sep">｜</span><span>課程資源中心</span></h1>
    <div class="sub">插件相容性 · 問題排查 · 硬體建議</div>
  </div>
  <a class="brand" href="https://sat.cool/course/160" target="_blank" rel="noopener">
    <span class="brand-name">Zack<b>3D</b></span>
    <span class="brand-tag">前往課程 →</span>
  </a>
</header>

<!-- 全站環境列 -->
<div class="envbar">
  <div class="envgrp">
    <span class="flabel">我的 Blender</span>
    <button class="chip" data-f="ver" data-v="all">全部</button>
    <button class="chip" data-f="ver" data-v="3.6">3.6</button>
    <button class="chip on" data-f="ver" data-v="4.5">4.5</button>
    <button class="chip" data-f="ver" data-v="5.2">5.2</button>
  </div>
  <div class="envgrp">
    <span class="flabel">系統</span>
    <button class="chip on" data-f="os" data-v="all">全部</button>
    <button class="chip" data-f="os" data-v="win">Windows</button>
    <button class="chip" data-f="os" data-v="mac">macOS</button>
  </div>
  <span class="envnote">選好之後全站內容都會跟著切換</span>
</div>

<nav class="tabs">
  <button class="on" data-tab="plugins">插件查詢</button>
  <button data-tab="faq">問題排查</button>
  <button data-tab="hw">硬體建議</button>
  <button data-tab="changelog">更新日誌</button>
</nav>

<section id="plugins">
  <div class="filters">
    <div class="frow">
      <span class="flabel">來源</span>
      <button class="chip on" data-f="src" data-v="all">全部</button>
      <button class="chip" data-f="src" data-v="external">外部下載</button>
      <button class="chip" data-f="src" data-v="builtin">內建／搜尋</button>
    </div>
    <div class="frow">
      <span class="flabel">搜尋</span>
      <input type="text" id="psearch" placeholder="輸入插件名稱關鍵字…">
    </div>
  </div>
  <div class="count">符合條件：<b id="pn">0</b> 個插件</div>
  <div id="plist"></div>
</section>
<section id="faq" class="hide">
  <div class="filters">
    <div class="frow">
      <span class="flabel">分類</span>
      <button class="chip on" data-f="fcat" data-v="all">全部</button>
      <button class="chip" data-f="fcat" data-v="安裝">安裝與啟動</button>
      <button class="chip" data-f="fcat" data-v="操作">操作與介面</button>
      <button class="chip" data-f="fcat" data-v="外掛">插件問題</button>
      <button class="chip" data-f="fcat" data-v="渲染">渲染與輸出</button>
      <button class="chip" data-f="fcat" data-v="檔案">檔案與相容</button>
    </div>
    <div class="frow">
      <span class="flabel">搜尋</span>
      <input type="text" id="fsearch" placeholder="描述你遇到的狀況…例如「中文變方框」">
    </div>
  </div>
  <div class="count">找到 <b id="fn">0</b> 筆</div>
  <div id="flist"></div>
  <div class="mailbox">
    <h3>還是沒解決嗎？</h3>
    <p>直接寄信給我，我會親自回覆。下面的按鈕會自動幫你帶入目前的環境資訊。</p>
    <a class="btn" id="mailbtn" href="#">寄信給查克</a>
  </div>
</section>
<section id="hw" class="hide"></section>
<section id="changelog" class="hide">
  <div class="filters">
    <div class="frow">
      <span class="flabel">類型</span>
      <button class="chip on" data-f="log" data-v="all">全部</button>
      <button class="chip" data-f="log" data-v="plugin">插件更新</button>
      <button class="chip" data-f="log" data-v="blender">Blender 更新</button>
      <button class="chip" data-f="log" data-v="alert">相容性警示</button>
      <button class="chip" data-f="log" data-v="course">課程內容</button>
    </div>
  </div>
  <div id="logs"></div>
</section>

</div>

<script>
/* ══════════════════════════════════════════════════════
   資料區　Claude Code 開發時只需要改這一大段
   ══════════════════════════════════════════════════════ */

/* ── 1. 插件列表 ──
   src: builtin=內建或擴充搜尋 / external=外部下載（含查克自製與第三方）
   builtin:true 的項目 render 會自動產生 3.6/4.5/5.2 三列，用 search 當安裝說明
   每版可有 home（官方頁面）與 url（直接下載 zip）；status 省略＝ok            */
const PLUGINS = [
  /* ===== 外部下載（含查克自製與第三方） ===== */
  { id:"quickshortcutmap", name:"快捷鍵地圖 2.0（QuickShortcutmap）", src:"external",
    tags:["流程優化"], chapter:"全部章節",
    desc:"按 F6 全螢幕叫出快捷鍵地圖，自動依作業系統顯示對應版本，附操作提示。",
    versions:[
      {bl:"5.2", os:["win","mac"], pv:"2.1.1", home:"https://github.com/zack3ddd/quickshortcutmap/", url:"https://github.com/zack3ddd/quickshortcutmap/releases/download/v2.1.1/QuickShortcutmap.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"4.5", os:["win","mac"], pv:"2.1.1", home:"https://github.com/zack3ddd/quickshortcutmap/", url:"https://github.com/zack3ddd/quickshortcutmap/releases/download/v2.1.1/QuickShortcutmap.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"3.6", os:["win","mac"], pv:"—", url:null, path:"—", status:"no", note:"3.6 有已知 bug，暫不支援，請改用 4.5 以上"}
    ]},
  { id:"curvearray", name:"Curve Array Objects", src:"external",
    tags:["建模","流程優化"], chapter:"章節 3-4",
    desc:"把物件或整個集合沿曲線各自獨立排列，即時跟隨曲線，支援隨機散佈與沿曲線變形。",
    versions:[
      {bl:"5.2", os:["win","mac"], pv:"3.3.1", home:"https://github.com/zack3ddd/curve-array-objects/", url:"https://github.com/zack3ddd/curve-array-objects/releases/download/v3.3.1/CurveArrayObjects.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"4.5", os:["win","mac"], pv:"3.3.1", home:"https://github.com/zack3ddd/curve-array-objects/", url:"https://github.com/zack3ddd/curve-array-objects/releases/download/v3.3.1/CurveArrayObjects.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"3.6", os:["win","mac"], pv:"3.3.1", home:"https://github.com/zack3ddd/curve-array-objects/", url:"https://github.com/zack3ddd/curve-array-objects/releases/download/v3.3.1/CurveArrayObjects.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝", note:"查克已實測 3.6 可用（低於官方標示的最低版本 4.3，屬非官方相容）"}
    ]},
  { id:"modeswitcher", name:"Mode Switcher", src:"external",
    tags:["流程優化"], chapter:"全部章節",
    desc:"用餅狀選單快速切換編輯模式，物體模式可直接跳到頂點／邊／面編輯。",
    versions:[
      {bl:"5.2", os:["win","mac"], pv:"1.1.0", home:"https://github.com/zack3ddd/mode-switcher/", url:"https://github.com/zack3ddd/mode-switcher/releases/download/v1.1.0/ModeSwitcher.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"4.5", os:["win","mac"], pv:"1.1.0", home:"https://github.com/zack3ddd/mode-switcher/", url:"https://github.com/zack3ddd/mode-switcher/releases/download/v1.1.0/ModeSwitcher.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"3.6", os:["win","mac"], pv:"1.1.0", home:"https://github.com/zack3ddd/mode-switcher/", url:"https://github.com/zack3ddd/mode-switcher/releases/download/v1.1.0/ModeSwitcher.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝", note:"查克已實測 3.6 可用（低於官方標示的最低版本 4.3）"}

  { id:"favmodifiers", name:"Favorite Modifiers", src:"external",
    tags:["流程優化","建模"], chapter:"全部章節",
    desc:"讓修改器面板可快速加入／管理常用修改器，依物件類型分組。原作者 Oleg Stepanov，查克繁中化延伸。",
    versions:[
      {bl:"5.2", os:["win","mac"], pv:"1.2.0", home:"https://github.com/zack3ddd/favorite-modifiers-tw/", url:"https://github.com/zack3ddd/favorite-modifiers-tw/releases/download/v1.2.0/favorite_modifiers_v1.2.0.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"4.5", os:["win","mac"], pv:"1.2.0", home:"https://github.com/zack3ddd/favorite-modifiers-tw/", url:"https://github.com/zack3ddd/favorite-modifiers-tw/releases/download/v1.2.0/favorite_modifiers_v1.2.0.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},

    ]},
  { id:"realsnow", name:"Real Snow", src:"external",
    tags:["材質","渲染"], chapter:"章節 6-4",
    desc:"在物件上快速生成擬真積雪材質與外形。原作者為官方，官方庫移除後由查克用 AI 更新維護以繼續使用。",
    versions:[
      {bl:"5.2", os:["win","mac"], pv:"1.3.2", home:"https://github.com/zack3ddd/real-snow/", url:"https://github.com/zack3ddd/real-snow/releases/download/v1.3.2/real_snow.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"4.5", os:["win","mac"], pv:"1.3.2", home:"https://github.com/zack3ddd/real-snow/", url:"https://github.com/zack3ddd/real-snow/releases/download/v1.3.2/real_snow.zip", path:"偏好設定 > 附加元件 > 從磁碟安裝"},
      {bl:"3.6", os:["win","mac"], pv:"內建", url:null, path:"偏好設定 > 附加元件 > 搜尋「Real Snow」打勾（3.6 官方自帶）", note:"3.6 直接用 Blender 官方內建版即可，不需這份"}
    ]},

/* ── 插件 ── */
function renderPlugins(){
  const q = document.getElementById("psearch").value.trim().toLowerCase();
  let n = 0, html = "";
  PLUGINS.forEach(p=>{
    if(F.src!=="all" && p.src!==F.src) return;
    if(q && !p.name.toLowerCase().includes(q) && !p.desc.includes(q)
         && !(p.tags||[]).join("").includes(q)) return;
    // builtin:true 的項目自動產生三版列（用 search 當安裝說明）
    const allV = p.versions || VERS.map(bl =>
      ({bl, os:["win","mac"], pv:"搜尋啟用", url:null, home:p.home, path:p.search}));
    const vs = allV.filter(v =>
      (F.ver==="all"||v.bl===F.ver) && (F.os==="all"||v.os.includes(F.os)));
    if(!vs.length) return;
    n++;
    html += `<div class="card">
      <div class="chead"><div style="flex:1">
        <span class="cname">${esc(p.name)}</span>${SRCB[p.src]||""}
        <div class="cdesc">${esc(p.desc)}</div>
        <div class="ctags"><span class="chip-chapter">📖 ${esc(p.chapter)}</span>${
          (p.tags||[]).map(t=>`<span class="ftag2">${esc(t)}</span>`).join("")}</div>
      </div></div>
      <div class="vbox">${vs.map(v=>{
        const [scls,slabel] = SMAP[v.status||"ok"];
        const dl = (v.url && v.status!=="no")
          ? `<a class="dl" href="${v.url}" target="_blank" rel="noopener">下載 ZIP</a>` : "";
        const home = v.home
          ? `<a class="home" href="${v.home}" target="_blank" rel="noopener">官方頁面</a>` : "";
        const acts = (home||dl) ? `<span class="acts">${home}${dl}</span>` : "";
        return `<div class="vrow${v.status==="no"?" vrow-no":""}">
          <span class="vtag">Blender ${v.bl}</span>
          <span class="status ${scls}">${slabel}</span>
          <span class="vtag">版本 ${esc(v.pv)}</span>
          <span class="os">${v.os.map(o=>OSN[o]).join(" / ")}</span>
          ${acts}
          <div class="path">安裝：${esc(v.path)}</div>
          ${v.note?`<div class="note">※ ${esc(v.note)}</div>`:""}
        </div>`;}).join("")}</div>
    </div>`;
  });
  document.getElementById("pn").textContent = n;
  document.getElementById("plist").innerHTML = n ? html
    : `<div class="empty">目前的篩選條件沒有對應的插件<br>試著放寬 Blender 版本或系統條件</div>`;
}

/* ── FAQ ── */
function renderFaq(){
  const q = document.getElementById("fsearch").value.trim().toLowerCase();
  const rows = FAQS.filter(f=>{
    if(F.fcat!=="all" && f.cat!==F.fcat) return false;
    if(F.ver!=="all" && !f.ver.includes(F.ver)) return false;
    if(F.os!=="all" && !f.os.includes(F.os)) return false;
    if(q && !(f.q+f.cause+f.fix+f.tags.join("")).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById("fn").textContent = rows.length;
  document.getElementById("flist").innerHTML = rows.length ? rows.map((f,i)=>`
    <div class="faq" data-faq="${i}">
      <div class="fq"><span>${esc(f.q)}</span><span class="arrow">▶</span></div>
      <div class="fa">
        <div class="lbl">可能原因</div><p>${esc(f.cause)}</p>
        <div class="lbl">解決方法</div><p>${esc(f.fix)}</p>
        <div class="ftags">${f.tags.map(t=>`<span class="ftag">${esc(t)}</span>`).join("")}
          <span class="ftag">${f.ver.join(" / ")}</span>
          <span class="ftag">${f.os.map(o=>OSN[o]).join(" / ")}</span></div>
      </div>
    </div>`).join("")
    : `<div class="empty">沒有符合的排查項目<br>試著用不同的關鍵字，或直接寄信給我</div>`;

  document.querySelectorAll(".faq .fq").forEach(el=>{
    el.onclick = () => el.parentElement.classList.toggle("open");
  });
  updateMail();
}

function updateMail(){
  const v = F.ver==="all" ? "（未選）" : F.ver;
  const o = F.os==="all" ? "（未選）" : OSN[F.os];
  const body =
`（請描述你遇到的問題，附上截圖會更快）

────────────
以下為系統自動帶入，請保留
Blender 版本：${v}
作業系統：${o}
瀏覽器回報時間：${new Date().toLocaleString("zh-TW")}
────────────`;
  document.getElementById("mailbtn").href =
    `mailto:hi@zack3d.art?subject=${encodeURIComponent(`[課程問題] Blender ${v} / ${o}`)}&body=${encodeURIComponent(body)}`;
}

/* ── 硬體 ── */
function renderHw(){
  const list = GPUS.filter(g => F.os==="all" || g.os.includes(F.os));
  document.getElementById("hw").innerHTML = `
    <div class="gpusel">
      <div class="frow" style="margin:0">
        <span class="flabel">我的顯卡</span>
        <select id="gpu">
          <option value="">請選擇你的顯示卡等級…</option>
          ${list.map(g=>`<option value="${g.id}">${esc(g.label)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div id="hwout"><div class="empty">選擇顯示卡後，會顯示建議的渲染引擎與參數</div></div>`;

  document.getElementById("gpu").onchange = e=>{
    const g = GPUS.find(x=>x.id===e.target.value);
    document.getElementById("hwout").innerHTML = g ? `
      <div class="rec">
        <h4>${esc(g.label)}</h4>
        <div class="kv"><span class="k">建議渲染引擎</span><span class="v">${esc(g.engine)}</span></div>
        <div class="kv"><span class="k">Cycles 後端</span><span class="v">${esc(g.backend)}</span></div>
        <div class="kv"><span class="k">取樣值 Samples</span><span class="v">${esc(g.samples)}</span></div>
        <div class="kv"><span class="k">降噪 Denoise</span><span class="v">${esc(g.denoise)}</span></div>
        <div class="kv"><span class="k">Tile Size</span><span class="v">${esc(g.tile)}</span></div>
      </div>
      <div class="rec"><h4>補充說明</h4><p style="color:var(--dim);font-size:.88rem">${esc(g.extra)}</p></div>`
      : `<div class="empty">選擇顯示卡後，會顯示建議的渲染引擎與參數</div>`;
  };
}

/* ── 日誌 ── */
function renderLogs(){
  const T = {plugin:["t-plugin","插件更新"], blender:["t-blender","Blender 更新"],
             alert:["t-alert","相容性警示"], course:["t-course","課程內容"]};
  const rows = LOGS.filter(l=>F.log==="all"||l.type===F.log);
  document.getElementById("logs").innerHTML = rows.length ? rows.map(l=>{
    const [c,t] = T[l.type];
    return `<div class="log">
      <span class="ldate">${l.date}</span><span class="ltype ${c}">${t}</span>
      <div class="ltitle">${esc(l.title)}</div><div class="lbody">${esc(l.body)}</div>
    </div>`;
  }).join("") : `<div class="empty">沒有這個類型的紀錄</div>`;
}

function renderAll(){ renderPlugins(); renderFaq(); renderHw(); }

/* ── 事件綁定 ── */
document.querySelectorAll(".chip").forEach(b=>{
  b.onclick = ()=>{
    const k = b.dataset.f;
    document.querySelectorAll(`.chip[data-f="${k}"]`).forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    F[k] = b.dataset.v;
    if(k==="log") renderLogs();
    else if(k==="src") renderPlugins();
    else if(k==="fcat") renderFaq();
    else renderAll();   // ver / os 影響全站
  };
});
document.getElementById("psearch").oninput = renderPlugins;
document.getElementById("fsearch").oninput = renderFaq;
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    ["plugins","faq","hw","changelog"].forEach(id=>
      document.getElementById(id).classList.toggle("hide", id!==b.dataset.tab));
  };
});

renderAll(); renderLogs();
</script>
</body>
</html>
